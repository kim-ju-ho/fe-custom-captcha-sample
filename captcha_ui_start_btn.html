
<div style="background:var(--color-background-primary);border:1px solid #ccc;padding:16px 20px;font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-size:13px;color:#333;max-width:700px;">

  <div style="font-size:14px;font-weight:500;color:#333;margin-bottom:8px;">
    사용중인 회선 정보
    <span style="font-size:11px;color:#c00;margin-left:4px;">· SLA테스트를 시작할 회선을 선택하세요.</span>
  </div>

  <div style="border:1px solid #ccc;display:flex;height:130px;margin-bottom:10px;">
    <div style="width:180px;min-width:180px;background:#f5f5f5;border-right:1px solid #ccc;padding:12px;display:flex;flex-direction:column;justify-content:center;">
      <div style="font-size:12px;font-weight:500;color:#333;line-height:1.6;">사용중인 유선인터넷 내역</div>
      <div style="font-size:12px;color:#333;">(상품명 - 설치장소)</div>
    </div>
    <div style="flex:1;display:flex;align-items:center;padding:12px;font-size:13px;color:#555;">
      사용중인 kt인터넷 회선정보가 없습니다.
    </div>
  </div>

  <div style="font-size:12px;color:#555;line-height:1.8;margin-bottom:16px;border-bottom:1px solid #e0e0e0;padding-bottom:14px;">
    *다회선을 이용하시는 고객님의 측정 대상 회선 선택을 위해 고객님 명의로 사용중인 회선 내역을 보여드립니다.<br>
    회선의 설치장소는 개인 정보 보호를 위해 최소한의 주소만 보여드리며, 측정이 종료되면 삭제되고 보관되지 않습니다.
  </div>

  <!-- 캡챠 영역 -->
  <div style="border:1px solid #ccc;padding:14px 16px;background:#fafafa;">
    <div style="font-size:13px;font-weight:500;color:#333;margin-bottom:10px;">
      보안 문자 입력
      <span style="font-size:11px;color:#888;font-weight:400;margin-left:6px;">아래 보안 문자를 입력해 주세요.</span>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <!-- 캡챠 이미지 -->
      <div style="width:180px;height:56px;border:1px solid #bbb;background:#fff;overflow:hidden;flex-shrink:0;">
        <canvas id="cv" width="180" height="56"></canvas>
      </div>

      <!-- 새로고침 버튼 -->
      <button onclick="drawCaptcha()" style="width:28px;height:56px;border:1px solid #bbb;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;" title="새로고침">↺</button>

      <!-- 입력란 -->
      <div style="display:flex;flex-direction:column;gap:6px;flex:1;">
        <input id="captchaInput" type="text" maxlength="6" placeholder="보안 문자 입력"
          style="width:100%;height:28px;border:1px solid #bbb;padding:0 8px;font-size:13px;font-family:inherit;outline:none;" />
        <div id="captchaMsg" style="font-size:11px;min-height:14px;"></div>
      </div>
    </div>

    <!-- 측정시작 버튼 -->
    <div style="display:flex;justify-content:center;margin-top:14px;">
      <button onclick="checkAndStart()"
        style="padding:0 40px;height:36px;background:#c00;color:#fff;border:none;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;letter-spacing:1px;">
        측정시작
      </button>
    </div>

    <div style="font-size:11px;color:#888;line-height:1.6;margin-top:12px;">
      * 보안 문자가 잘 보이지 않을 경우 ↺ 버튼을 클릭하여 새로운 문자를 받아주세요.
    </div>
  </div>

</div>

<script>
const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
const COLORS = ['#1a4fa0','#7c3aed','#be185d','#0f766e','#b45309'];
let answer = '';

function ri(a,b){return Math.floor(Math.random()*(b-a))+a;}
function rf(a,b){return a+Math.random()*(b-a);}

function drawCaptcha(){
  const cv = document.getElementById('cv');
  const W = cv.width, H = cv.height;
  const g = cv.getContext('2d');
  answer = '';
  for(let i=0;i<5;i++) answer += CHARS[ri(0,CHARS.length)];

  g.fillStyle = '#fff';
  g.fillRect(0,0,W,H);

  g.strokeStyle = '#e0e0e0';
  g.lineWidth = 0.5;
  for(let x=0;x<W;x+=10){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();}
  for(let y=0;y<H;y+=10){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke();}

  for(let i=0;i<3;i++){
    g.strokeStyle = COLORS[ri(0,COLORS.length)]+'55';
    g.lineWidth = rf(1,2);
    g.beginPath();
    g.moveTo(ri(0,W/3),ri(0,H));
    g.bezierCurveTo(ri(W/4,W*3/4),ri(0,H),ri(W/4,W*3/4),ri(0,H),ri(W*2/3,W),ri(0,H));
    g.stroke();
  }

  const slotW = (W-10)/answer.length;
  for(let i=0;i<answer.length;i++){
    g.save();
    g.translate(5+slotW*i+slotW/2, H/2+ri(-3,4));
    g.rotate(rf(-0.3,0.3));
    g.font = `bold ${ri(20,26)}px 'Courier New',monospace`;
    const w = g.measureText(answer[i]).width;
    g.fillStyle = 'rgba(255,255,255,0.5)';
    g.fillText(answer[i], -w/2+1, 7+1);
    g.fillStyle = COLORS[i%COLORS.length];
    g.fillText(answer[i], -w/2, 7);
    g.restore();
  }

  document.getElementById('captchaInput').value = '';
  document.getElementById('captchaMsg').textContent = '';
  document.getElementById('captchaMsg').style.color = '';
}

function checkAndStart(){
  const val = document.getElementById('captchaInput').value.toUpperCase().trim();
  const msg = document.getElementById('captchaMsg');
  if(!val){
    msg.textContent = '✖ 보안 문자를 입력해 주세요.';
    msg.style.color = '#c00';
    return;
  }
  if(val === answer){
    msg.textContent = '✔ 확인되었습니다. 측정을 시작합니다.';
    msg.style.color = '#0a7a3a';
  } else {
    msg.textContent = '✖ 보안 문자가 일치하지 않습니다. 다시 입력해 주세요.';
    msg.style.color = '#c00';
    drawCaptcha();
  }
}

document.getElementById('captchaInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') checkAndStart();
});

drawCaptcha();
</script>
